name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: clojure:tools-deps-1.12.5.1716-temurin-21
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint with clj-kondo
        run: clojure -M:lint

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: clojure:tools-deps-1.12.5.1716-temurin-21
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: clojure -M:test/unit
